name: Update one daily stock

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "6-digit stock ticker"
        required: true
        type: string
      name:
        description: "Stock name"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 finance-datareader

      - name: Update requested stock
        env:
          INPUT_TICKER: ${{ inputs.ticker }}
          INPUT_NAME: ${{ inputs.name }}
        run: python update_market_daily.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily history for ${{ inputs.name }} (${{ inputs.ticker }})"
            git push
          fi
