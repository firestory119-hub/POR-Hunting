name: Update multiple daily stocks

on:
  workflow_dispatch:
    inputs:
      items_json:
        description: "JSON list of stocks"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: por-bulk-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 requests git+https://github.com/FinanceData/FinanceDataReader.git

      - name: Collect requested stocks
        env:
          ITEMS_JSON: ${{ inputs.items_json }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python update_bulk_daily.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/market_history.csv data/financial_data.csv data/corp_codes.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Bulk update daily and financial data"
          git push origin HEAD:main
