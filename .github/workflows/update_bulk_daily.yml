name: Update up to 100 daily stocks

on:
  workflow_dispatch:
    inputs:
      items_json:
        description: "JSON list of up to 100 stocks"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: por-bulk-100-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 requests git+https://github.com/FinanceData/FinanceDataReader.git

      - name: Collect and save in batches
        env:
          ITEMS_JSON: ${{ inputs.items_json }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python update_bulk_daily.py
