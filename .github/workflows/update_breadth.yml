name: Update Market Breadth

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install packages
        run: pip install pandas requests pykrx finance-datareader
      - name: Build breadth data
        run: python update_breadth.py
      - name: Commit breadth data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/breadth_history.csv data/breadth_close_history.csv
          git diff --cached --quiet || git commit -m "Update market breadth"
          git push
