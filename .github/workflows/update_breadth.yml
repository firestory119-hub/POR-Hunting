name: Update Market Breadth

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests finance-datareader

      - name: Build breadth data
        env:
          BREADTH_WORKERS: "20"
        run: python update_breadth.py

      - name: Commit breadth data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/breadth_close_history.csv data/breadth_history.csv
          if git diff --cached --quiet; then
            echo "No breadth changes"
          else
            git commit -m "Update market breadth"
            git push
          fi
