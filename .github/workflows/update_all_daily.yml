name: Nightly daily update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: nightly-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 git+https://github.com/FinanceData/FinanceDataReader.git

      - name: Update all collected stocks
        run: python update_all_daily.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/market_history.csv data/daily_update_log.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Nightly daily market update"
          git push origin HEAD:main
