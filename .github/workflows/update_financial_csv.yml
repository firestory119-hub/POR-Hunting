name: Update financial data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 1-5"

permissions:
  contents: write

jobs:
  update-financial:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Update financial CSV
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python update_financial_csv.py

      - name: Commit financial CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/financial_data.csv data/corp_codes.csv
          git diff --cached --quiet || git commit -m "Update financial data"
          git push
