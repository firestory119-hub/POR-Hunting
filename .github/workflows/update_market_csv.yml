name: Update market data CSV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests FinanceDataReader

      - name: Update CSV
        run: python update_market_csv.py

      - name: Commit CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/market_data.csv
          git commit -m "Update market_data.csv" || echo "No changes"
          git push
